<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="main.css">

    
    <title>Jazaa Global - Testing</title>
</head>
<body>
    <a href="https://order.jazaaglobal.com/"><div class="ShopNow">
        <div class="Text">
            SHOP NOW
        </div>
    </div></a>
    <section class="Landing" id="Landing">
        <header class="Main_Header">
            <div class="Container">
                <div class="Box First">
                    <ul>
                        <li>ABOUT</li>
                        <div class="line"></div>
                        <li>OUR MANAGEMENT</li>
                        <div class="line"></div>
                        <li>OUR RANGE</li>
                        <div class="line"></div>
                    </ul>
                </div>
                <div class="Logo">
                    <img src="LOGO.png" alt="#">
                </div>
                <div class="Box Second">
                    <ul>
                        <div class="line"></div>
                        <li>AWARDS</li>
                        <div class="line"></div>
                        <li>CONTACT US</li>
                        <div class="line"></div>
                        <li>CAREER</li>
                        <div class="line"></div>
                        <li>MEDIA</li>
                    </ul>
                </div>
            </div>
        </header>

        <div class="Title">
            <div class="Text FirstText">
                Range of Plain Spices
            </div>            
            <div class="Text SecondText">
                Range of DESSERTS
            </div>
            <div class="Text ThirdText">
                Range of TEA DELIGHTS
            </div>
            <div class="Text FourthText">
                Range of RICE
            </div>
        </div>

        <div class="Area">
            <a href="https://order.jazaaglobal.com/collections/plain-spices" target="_blank"><div class="Animation_Item_Plain_Spice" id="FirstRange">
                <img src="PlainSpice.png" alt="" class="items1" draggable="false">
                <img src="AImage.png" alt="" class="items2" draggable="false">
                <img src="BImage.png" alt="" class="items3" draggable="false">
                <img src="CImage.png" alt="" class="items4" draggable="false">
                <img src="DImage.png" alt="" class="items5" draggable="false">
                <img src="EImage.png" alt="" class="items6" draggable="false">
            </div></a>
            <a href="https://order.jazaaglobal.com/collections/desserts" target="_blank"><div class="Animation_Item_Desserts" id="SecondRange">
                <img src="DESSERTS.png" alt="" class="items1" draggable="false">
                <img src="Aimagedessert.png" alt="" class="items2" draggable="false">
                <img src="Bimagedessert.png" alt="" class="items3" draggable="false">
                <img src="Dimagedessert.png" alt="" class="items4" draggable="false">
                <img src="Cimagedessert.png" alt="" class="items5" draggable="false">
                <img src="Eimagedessert.png" alt="" class="items6" draggable="false">
            </div></a>
            <a href="https://order.jazaaglobal.com/collections/tea-delights" target="_blank"><div class="Animation_Item_TeaDelights" id="ThirdRange">
                <img src="TEADELIGHTS.png" alt="" class="items1" draggable="false">
                <img src="Aimageteadelights.webp" alt="" class="items2" draggable="false">
                <!-- <img src="Bimageteadelights.png" alt="" class="items3" draggable="false"> -->
                <img src="Cimageteadelights.png" alt="" class="items4" draggable="false">
            </div></a>
            <a href="https://order.jazaaglobal.com/collections/tea-delights" target="_blank"><div class="Animation_Item_Rice" id="FourthRange">
                <img src="RICE.png" alt="" class="items1" draggable="false">
                <img src="pexels-fotios-photos-109260-Photoroom.png" alt="" class="items2" draggable="false">
                <!-- <img src="Bimageteadelights.png" alt="" class="items3" draggable="false"> -->
                <img src="images-Photoroom.png" alt="" class="items4" draggable="false">
            </div></a>
            <img class="First" src="PLATEA.png" alt="" draggable="false">
            <img class="Second" src="PLATEB.png" alt="" draggable="false">
        </div>
        <div class="Slider">
            <div id="button1" class="Changer First_Slider" onclick="changeSlider(1)"></div>
            <div id="button2" class="Changer Second_Slider" onclick="changeSlider(2)"></div>
            <div id="button3" class="Changer Third_Slider" onclick="changeSlider(3)"></div>
            <div id="button4" class="Changer Fourth_Slider" onclick="changeSlider(4)"></div>
            <div id="button5" class="Changer"></div>
            <div id="button6" class="Changer"></div>
        </div>

    <section class="About">

    </section>
